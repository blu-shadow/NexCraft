<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1e1e35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(108,99,255,0.08)"/>
  <circle cx="150"  cy="530" r="150" fill="rgba(245,158,11,0.06)"/>

  <!-- Grid lines -->
  <line x1="0"    y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600"  y1="0"   x2="600"  y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Logo icon -->
  <circle cx="200" cy="315" r="70" stroke="url(#accent)" stroke-width="4"
          fill="none" stroke-dasharray="280 110" stroke-linecap="round"
          transform="rotate(-90 200 315)"/>
  <circle cx="200" cy="315" r="22" fill="url(#accent)"/>
  <circle cx="200" cy="244" r="10" fill="#f59e0b"/>

  <!-- Title -->
  <text x="320" y="285"
    font-family="Sora, sans-serif"
    font-size="80"
    font-weight="800"
    fill="white"
    letter-spacing="-2">1000 Din</text>

  <!-- Subtitle -->
  <text x="322" y="345"
    font-family="DM Sans, sans-serif"
    font-size="28"
    font-weight="400"
    fill="rgba(136,136,170,1)"
    letter-spacing="6">WEB &amp; TECH SERVICES</text>

  <!-- Accent line -->
  <rect x="320" y="368" width="200" height="4" rx="2" fill="url(#accent)"/>

  <!-- Bottom tags -->
  <rect x="320"  y="430" width="160" height="44" rx="22" fill="rgba(108,99,255,0.2)" stroke="rgba(108,99,255,0.4)" stroke-width="1"/>
  <rect x="494"  y="430" width="180" height="44" rx="22" fill="rgba(108,99,255,0.1)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
  <rect x="688"  y="430" width="200" height="44" rx="22" fill="rgba(108,99,255,0.1)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>

  <text x="399"  y="458" font-family="DM Sans, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">Web Design</text>
  <text x="583"  y="458" font-family="DM Sans, sans-serif" font-size="16" fill="#8888aa" text-anchor="middle">App Development</text>
  <text x="787"  y="458" font-family="DM Sans, sans-serif" font-size="16" fill="#8888aa" text-anchor="middle">Chip-Level Repair</text>
</svg>
