<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="64" height="64" rx="16" fill="#0f0f1a"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- "1000" stylized as a clock/progress -->
  <circle cx="32" cy="32" r="20" stroke="url(#g2)" stroke-width="3" fill="none"
          stroke-dasharray="90 36" stroke-linecap="round"
          transform="rotate(-90 32 32)"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="5" fill="url(#g1)"/>

  <!-- Tick mark at top (12 o'clock) -->
  <line x1="32" y1="10" x2="32" y2="15" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Accent dots -->
  <circle cx="32" cy="8"  r="2" fill="#f59e0b" opacity="0.8"/>
  <circle cx="56" cy="32" r="2" fill="#6c63ff" opacity="0.6"/>
  <circle cx="8"  cy="32" r="2" fill="#6c63ff" opacity="0.6"/>
</svg>
