<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6c63ff"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <rect width="48" height="48" rx="14" fill="#0f0f1a" x="0" y="4"/>
  <circle cx="24" cy="28" r="14" stroke="url(#logoGrad)" stroke-width="2"
          fill="none" stroke-dasharray="60 28" stroke-linecap="round"
          transform="rotate(-90 24 28)"/>
  <circle cx="24" cy="28" r="5" fill="url(#logoGrad)"/>
  <circle cx="24" cy="13" r="2.5" fill="#f59e0b"/>

  <!-- "1000" text -->
  <text
    x="60"
    y="23"
    font-family="'Sora', 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="800"
    fill="url(#logoGrad)"
    letter-spacing="-0.5"
  >1000</text>

  <!-- "Din" text -->
  <text
    x="61"
    y="45"
    font-family="'DM Sans', 'Segoe UI', sans-serif"
    font-size="14"
    font-weight="400"
    fill="#8888aa"
    letter-spacing="4"
  >DIN</text>

  <!-- Accent line -->
  <rect x="60" y="49" width="48" height="2" rx="1" fill="url(#logoGrad)" opacity="0.6"/>
</svg>
